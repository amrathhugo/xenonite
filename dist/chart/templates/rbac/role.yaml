{{- if .Values.rbac.enable }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: xenonite-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.xenonite.io
  resources:
  - proxmoxproviders
  - xenonnodepools
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims/finalizers
  verbs:
  - update
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims/status
  - xenonnodepools/status
  verbs:
  - get
  - patch
  - update
{{- end -}}
