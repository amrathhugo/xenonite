# This rule is not used by the project xenonite itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the core.xenonite.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: xenonite
    app.kubernetes.io/managed-by: kustomize
  name: xenonnodeclaim-editor-role
rules:
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims/status
  verbs:
  - get
