---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims/finalizers
  verbs:
  - update
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims/status
  verbs:
  - get
  - patch
  - update
