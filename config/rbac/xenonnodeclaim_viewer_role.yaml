# This rule is not used by the project xenonite itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to core.xenonite.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: xenonite
    app.kubernetes.io/managed-by: kustomize
  name: xenonnodeclaim-viewer-role
rules:
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.xenonite.io
  resources:
  - xenonnodeclaims/status
  verbs:
  - get
